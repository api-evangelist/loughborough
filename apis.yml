modified: '2026-06-03'
specificationVersion: '0.19'
apis:
  - aid: loughborough:research-repository-rest
    name: Loughborough Research Repository (figshare REST API)
    description: >-
      The Loughborough Research Repository is the institution's research output
      and dataset repository, powered by figshare. Records are accessible
      programmatically through the standard figshare v2 REST API filtered to the
      Loughborough institution, returning articles, datasets, theses, and other
      research outputs.
    humanURL: https://docs.figshare.com/
    baseURL: https://api.figshare.com/v2/articles?institution=2
    tags: [ Research Data, Repository, Open Access, Datasets, figshare ]
    properties:
      - type: Documentation
        url: https://docs.figshare.com/
      - type: OpenAPI
        url: openapi/loughborough-research-repository-rest.yaml
      - type: JSONSchema
        url: json-schema/loughborough-article-schema.json
      - type: x-json-structure
        url: json-structure/loughborough-article-structure.json
      - type: x-example
        url: examples/loughborough-get-article-example.json
      - type: x-spectral-rules
        url: rules/loughborough-rules.yml
      - type: x-vocabulary
        url: vocabulary/loughborough-vocabulary.yml
      - type: x-json-ld-context
        url: json-ld/loughborough-context.jsonld
  - aid: loughborough:research-repository-oai
    name: Loughborough Research Repository OAI-PMH
    description: >-
      OAI-PMH metadata harvesting endpoint for the Loughborough Research
      Repository, served via figshare and scoped to the Loughborough portal
      set. Supports Open Archives Initiative Protocol for Metadata Harvesting
      verbs (ListIdentifiers, ListRecords, Identify) for interoperability with
      aggregators such as CORE and OpenAIRE.
    humanURL: https://docs.figshare.com/
    baseURL: https://api.figshare.com/v2/oai?verb=Identify&set=portal_2
    tags: [ Research Data, OAI-PMH, Metadata, Harvesting, Open Access ]
    properties:
      - type: Documentation
        url: https://docs.figshare.com/
  - aid: loughborough:shibboleth-idp
    name: Loughborough Shibboleth/SAML Identity Provider
    description: >-
      Loughborough University's Shibboleth-based SAML 2.0 identity provider used
      for federated single sign-on (the UK Access Management Federation) across
      university and licensed third-party services. The SAML metadata endpoint
      is publicly referenced but is access-controlled and intended for
      federation members rather than general developer use.
    humanURL: https://www.lboro.ac.uk/services/it/topics/student-account/
    tags: [ Identity, SSO, SAML, Shibboleth, Authentication ]
    properties:
      - type: Documentation
        url: https://www.lboro.ac.uk/services/it/topics/student-account/
