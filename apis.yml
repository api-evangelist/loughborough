---
aid: loughborough
name: Loughborough University
description: >-
  Loughborough University is a public research university in Leicestershire,
  United Kingdom, ranked #224 in the QS World University Rankings 2025. It is
  well known for sport, engineering, and design programmes and operates a
  campus in London alongside its main Loughborough campus. The university does
  not publish a first-party developer portal or open-data API; its public
  programmatic footprint is limited to its figshare-powered Loughborough
  Research Repository (which exposes the standard figshare REST API and an
  OAI-PMH metadata harvesting endpoint scoped to the institution) and a
  Shibboleth/SAML identity provider used for federated single sign-on.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/loughborough/refs/heads/main/apis.yml
