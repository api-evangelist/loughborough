      Loughborough University publishes no first-party developer portal or
      open-data API. Verified live: the official website (200), the figshare
      institution-scoped REST endpoint (200), the figshare OAI-PMH endpoint
      (200), and the GitHub org (200, but zero public repositories). The
      Shibboleth/SAML IdP metadata URL is referenced in documentation but
      returned a 500 on probe and is federation-gated, not a general developer
      resource. No endpoints were fabricated; the programmatic surface is
      effectively third-party (figshare) plus federated identity.
